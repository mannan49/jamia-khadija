<div class="bg-main p-6 m-4 rounded-2xl shadow-lg">
  @if (studentLoading) {
    <app-loader />
  } @else {
    @if (isEditMode) {
      <h1 class="font-bold text-2xl text-center my-2">طالبعلم کی تفصیل ترمیم کریں</h1>
    } @else {
      <h1 class="font-bold text-2xl text-center my-2">نئے طالبعلم کا اندراج</h1>
    }

    <form [formGroup]="studentForm" (ngSubmit)="onSubmitForm()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mt-2">
        <app-input placeholder="طالبعلم کا نام درج کریں" label="نام" controlName="name" />
        <app-input
          placeholder="والد کا نام درج کریں"
          label="والد کا نام"
          controlName="fatherName"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mt-5">
        <app-input placeholder="داخلہ نمبر درج کریں" label="داخلہ نمبر" controlName="registrationNumber" />
        <app-input placeholder="رابطہ نمبر درج کریں" label="رابطہ نمبر" controlName="phone" />

        <!-- <app-select
          placeholder="جماعت منتخب کریں"
          label="جماعت"
          controlName="class"
          [options]="classesList"
        /> -->
      </div>

      <!-- <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mt-5">
        <app-select
          placeholder="صنف منتخب کریں"
          label="صنف"
          controlName="gender"
          [options]="genderList"
        />
        <app-select
          placeholder="شعبہ منتخب کریں"
          label="شعبہ"
          controlName="department"
          [options]="departmentsList"
        />
      </div> -->

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mt-5">
        <app-input label="تاریخ پیدائش" controlName="dateOfBirth" type="date" />
        <app-input label="داخلہ تاریخ" controlName="enrollmentDate" type="date" />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mt-5">
        <app-input
          placeholder="00000-0000000-0"
          label="طالبعلم کا شناختی کارڈ"
          controlName="cnic"
        />
        <app-input
          placeholder="00000-0000000-0"
          label="والد کا شناختی کارڈ"
          controlName="parentCnic"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mt-5">
        <app-input placeholder="گھر کا پتہ درج کریں" label="پتہ" controlName="address" />
      </div>

      <div class="mt-6">
        <app-button
          label="محفوظ کریں"
          [disabled]="studentForm.invalid"
          type="submit"
          [loading]="loading"
          [className]="'bg-primary w-1/3 mx-auto'"
        />
      </div>
    </form>
  }
</div>
