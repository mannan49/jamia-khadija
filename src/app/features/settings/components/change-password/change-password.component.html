<form [formGroup]="changePasswordForm" (ngSubmit)="onSubmitForm()">
  <div class="bg-white m-4 rounded-lg shadow-sm border border-gray-200">
    <div class="p-6">
      <div class="flex items-center mb-4">
        <span class="material-icons mr-2">lock</span>
        <h2 class="text-xl font-semibold text-gray-900">پاس ورڈ تبدیل کریں</h2>
      </div>

      <p class="text-gray-600 mb-4">مضبوط پاس ورڈ استعمال کر کے اپنے اکاؤنٹ کو محفوظ رکھیں</p>

      <div class="grid grid-cols-1 gap-2 max-w-md">
        <app-input controlName="currentPassword" type="password" label="موجودہ پاس ورڈ" placeholder="اپنا موجودہ پاس ورڈ درج کریں" />
        <app-input controlName="newPassword" type="password" label="نیا پاس ورڈ" placeholder="اپنا نیا پاس ورڈ درج کریں" />
        <app-input controlName="confirmPassword" type="password" label="پاس ورڈ کی تصدیق کریں" placeholder="پاس ورڈ کی تصدیق کریں" />
      </div>

      <div class="mt-4">
        <app-button label="پاس ورڈ تبدیل کریں" type="submit" [className]="'bg-primary'" />
      </div>
    </div>
  </div>
</form>
