<div dir="rtl" class="relative w-full max-w-xl mx-auto bg-main rounded-full">
  <input 
    placeholder="یہاں کچھ لکھیں" 
    (input)="onInputChange()" 
    class="rounded-full w-full h-16 bg-transparent py-2 pr-8 pl-32 outline-none border-2 border-gray-100 shadow-md hover:outline-none text-right"
    type="text" 
    [(ngModel)]="query" 
    name="query" 
    id="query"
  >

  <button 
    type="submit" 
    (click)="onSearchButtonClick()" 
    class="absolute inline-flex items-center h-10 px-4 py-2 text-sm text-white transition duration-150 ease-in-out rounded-full outline-none left-3 top-3 bg-teal-600 sm:px-6 sm:text-base sm:font-medium hover:bg-teal-700 focus:outline-none cursor-pointer"
  >
    <svg 
      class="ml-2 w-4 h-4 sm:h-5 sm:w-5" 
      xmlns="http://www.w3.org/2000/svg" 
      fill="none" 
      viewBox="0 0 24 24" 
      stroke="currentColor"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
    </svg>
    تلاش کریں
  </button>
</div>
